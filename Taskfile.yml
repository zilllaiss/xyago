version: "3"

vars:
  JSLIB_PATH: assets/js/lib
  TEMPL_VER: "v0.3.1001"
  ALPINEJS_VER: "3.13.7"

  PROD_DEST: "{{.ROOT_DIR}}/../zilllaiss.github.io"
  PROD: "false"

tasks:
  build:all:
    desc: build all the project components.
    aliases:
      - b-all
    cmds:
      - task: build
        vars:
          SKIP_GEN: "true"
      - task: build:tut

  build:
    desc: build the project
    aliases:
      - b
    cmds:
      - task: gen
        vars:
          SKIP_GEN: "{{.SKIP_GEN}}"
      - go build -o bin/xyago
      - FEST_SRC="{{.ROOT_DIR}}" FEST_DEST={{.ROOT_DIR}}/dist ./bin/xyago
      - task: sync

  build:tut:
    cmds:
      - |
        {{$distdir := (list .ROOT_DIR "dist/tut" | join "/")}}
        {{$bindir := (list .ROOT_DIR "bin" | join "/")}}

        mkdir -p "{{$distdir}}"
        cd TUT
        task gen BIN_DIR="{{$bindir}}"
        task build BIN_DIR="{{$bindir}}"

        DIST_PATH="{{$distdir}}" TUT_ASSETS_DIR="{{.ROOT_DIR}}/dist/assets" \
          task dist BIN_DIR="{{$bindir}}"
      - task: sync

  sync:
    if: '"{{.PROD}}" == "true"'
    cmds:
      - npx prettier --write --ignore-path '' "{{.ROOT_DIR}}/dist/**/**.html"
      - rsync --archive --delete --exclude=.git -v '{{.ROOT_DIR}}/dist/' '{{.PROD_DEST}}'

  new:
    desc: initialize a new post
    requires:
      vars:
        - SLUG
    preconditions:
      - sh: "! test -f ./posts/{{.SLUG}}.md"
        msg: File already exists
    silent: true
    vars:
      TITLE: '{{.TITLE | default "Hello, world!"}}'
      FILEPATH: ./posts/{{.SLUG}}.md
      CURRENT_DATE:
        sh: date -I
      TEMPLATE: |
        ---
        title: {{.TITLE}}
        public: false
        published: {{.CURRENT_DATE}}
        updated: ''
        preamble: Hello, world!
        author: Zill_Laiss
        tags:
          - draft
        ---

        ## Draft

    cmds:
      - echo "{{.TEMPLATE}}" > {{.FILEPATH}}
      - echo '{{.FILEPATH}} is succesfully created.'

  run:
    cmds:
      - ./bin/xyago

  init:all:
    cmds:
      - task: init
      - task: init:tut

  init:
    aliases:
      - deps
    cmds:
      - task: deps:alpinejs
      - task: deps:templ
      - npm i
      - go mod tidy

  init:tut:
    cmds:
      - |
        cd TUT
        task init BIN_DIR='{{.ROOT_DIR}}/bin'

  dev:
    cmds:
      - |
        air &
        npx live-server --port=8080 dist

  live:
    desc: launch live-server
    cmds:
      - npx live-server --port=8080 '{{.ROOT_DIR}}/dist'

  generate:
    if: 'test "{{.SKIP_GEN}}" != "true"'
    aliases:
      - gen
    cmds:
      - task: gen:templ

  git:
    cmds:
      - git {{.CLI_ARGS}}
      - |
        cd ../zilllaiss.github.io/ &&
        git {{.CLI_ARGS}}

  ##### INTERNAL ######

  deps:alpinejs:
    internal: true
    status:
      - test -f {{.JSLIB_PATH}}/alpine.js
      - "[[ $(cat .task/alpinejs_ver) == {{.ALPINEJS_VER}} ]]"
    cmds:
      - mkdir -p .task
      - echo "intalling alpinejs..."
      - curl https://unpkg.com/alpinejs@{{.ALPINEJS_VER}}/dist/cdn.min.js -o {{.JSLIB_PATH}}/alpine.js
      - "echo {{.ALPINEJS_VER}} > .task/alpinejs_ver"

  deps:templ:
    internal: true
    status:
      - test -f ./bin/templ && [[ $(./bin/templ version) == {{.TEMPL_VER}} ]]
    cmds:
      - echo "installing templ..."
      - GOBIN="{{.ROOT_DIR}}/bin" go install github.com/a-h/templ/cmd/templ@{{.TEMPL_VER}}
      - go get github.com/a-h/templ@{{.TEMPL_VER}}

  generate:templ:
    aliases:
      - gen:templ
    sources:
      - views/*.templ
    generates:
      - views/*_templ.go
    cmds:
      - ./bin/templ generate
